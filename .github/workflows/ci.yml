name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: guia_produto_radar_ci
          POSTGRES_USER: gpr_ci_user
          POSTGRES_PASSWORD: gpr_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gpr_ci_user -d guia_produto_radar_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: ci
      DATABASE_URL: postgresql+psycopg://gpr_ci_user:gpr_ci_password@localhost:5432/guia_produto_radar_ci
      REDIS_URL: redis://localhost:6379/0
      ADMIN_CORS_ORIGINS: http://localhost:18090

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Install PHP CLI for plugin checks
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Validate required files
        run: |
          set -euo pipefail
          missing=0
          for file in AGENTS.md README.md .env.example docker-compose.yml; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required file is missing"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate no real env files or hardcoded secrets
        run: |
          set -euo pipefail

          sensitive_env_files="$(
            git ls-files \
              | grep -E '(^|/)\.env($|[._-])' \
              | grep -Ev '(^|/)\.env(\.staging)?\.example$' \
              || true
          )"

          if [ -n "$sensitive_env_files" ]; then
            echo "::error::Sensitive env files are versioned:"
            echo "$sensitive_env_files"
            exit 1
          fi

          if git grep -nE '(sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----|Bearer [A-Za-z0-9._-]{20,})'; then
            echo "::error::Potential hardcoded secret found"
            exit 1
          fi

      - name: Basic Python lint
        run: |
          python -m compileall -q apps/api/app apps/api/tests packages tests

      - name: Validate WordPress plugin structure
        run: |
          set -euo pipefail

          required_plugin_files=(
            "wordpress/plugins/guia-produto-radar/guia-produto-radar.php"
            "wordpress/plugins/guia-produto-radar/includes/admin.php"
            "wordpress/plugins/guia-produto-radar/includes/api-client.php"
            "wordpress/plugins/guia-produto-radar/includes/shortcodes.php"
            "wordpress/plugins/guia-produto-radar/assets/css/frontend.css"
          )

          for file in "${required_plugin_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::Required plugin file is missing"
              exit 1
            fi
          done

          grep -q "Plugin Name: Guia Produto Radar" wordpress/plugins/guia-produto-radar/guia-produto-radar.php
          grep -q "register_setting" wordpress/plugins/guia-produto-radar/includes/admin.php
          grep -q "add_shortcode('guia_produto_radar'" wordpress/plugins/guia-produto-radar/includes/shortcodes.php
          grep -q "set_transient" wordpress/plugins/guia-produto-radar/includes/api-client.php
          grep -q "wp_enqueue_style" wordpress/plugins/guia-produto-radar/includes/shortcodes.php

          if grep -R -nE "wp_insert_post|wp_update_post|INSERT INTO|CREATE TABLE|ALTER TABLE|DROP TABLE" wordpress/plugins/guia-produto-radar; then
            echo "::error::Plugin must not create posts or alter database schema in this phase"
            exit 1
          fi

      - name: PHP syntax lint
        run: |
          find wordpress/plugins/guia-produto-radar -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Validate Alembic migrations
        working-directory: apps/api
        run: |
          python -m alembic upgrade head
          python -m alembic current

      - name: Run tests
        run: |
          python -m pytest
